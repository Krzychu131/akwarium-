<script>
// Śledzenie pól które są aktualnie edytowane (mają focus)
const focusedFields = new Set();
const changedFields = new Set();

// Mapowanie pól do kluczy JSON
const fieldMapping = {
    'sensor1': 'D1',
    'sensor2': 'D2',
    'sensor3': 'D3',
    'sensor4': 'D4',
    'sensor5': 'D5',
    'sensor6': 'D6',
    'setting1': 'S1',
    'setting2': 'S2',
    'setting3': 'S3',
    'setting4': 'S4',
    'setting5': 'S5',
    'setting6': 'S6',
    'temperature': 'T',
    'flow': 'V',
    'ph': 'PH',
    'gh': 'GH',
    'kh': 'KH',
    'no2': 'NO2',
    'no3': 'NO3',
    'cl2': 'CL2'
};

// Funkcja zapisywania danych do serwera
async function saveData(fieldId, value) {
    const jsonKey = fieldMapping[fieldId];
    if (!jsonKey) return;

    try {
        // Przygotuj tylko zmienione pole do wysłania (POST aktualizuje tylko przekazane wartości)
        const dataToSave = {};
        
        // Pola S1-S6 są stringami, pozostałe są numeryczne
        if (jsonKey.startsWith('S')) {
            // Pole tekstowe (ustawienie podawania)
            if (value === '') {
                // Usuń pole jeśli jest puste
                dataToSave[jsonKey] = '';
            } else {
                dataToSave[jsonKey] = value;
            }
        } else {
            // Pole numeryczne
            const numValue = value === '' ? null : parseFloat(value);
            if (numValue !== null && !isNaN(numValue)) {
                dataToSave[jsonKey] = numValue;
            } else if (value === '') {
                // Usuń pole jeśli jest puste
                dataToSave[jsonKey] = '';
            } else {
                return; // Nieprawidłowa wartość
            }
        }

        // Wyślij tylko zmienione pole do serwera (POST aktualizuje tylko przekazane wartości)
        const saveRes = await fetch("api.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dataToSave)
        });

        if (saveRes.ok) {
            const result = await saveRes.json();
            console.log("Odpowiedź serwera:", result);
            if (result.success) {
                // Pokaż wskaźnik zapisu
                let indicatorId;
                if (fieldId.startsWith('sensor')) {
                    indicatorId = 'indicator' + fieldId.replace('sensor', '');
                } else if (fieldId.startsWith('setting')) {
                    indicatorId = 'indicator' + fieldId.replace('setting', '');
                } else {
                    indicatorId = 'indicator-' + fieldId;
                }
                const indicator = document.getElementById(indicatorId);
                if (indicator) {
                    indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 2000);
                }
                // Zaktualizuj oryginalną wartość po zapisaniu
                const field = document.getElementById(fieldId);
                if (field) {
                    field.setAttribute('data-original-value', value);
                }
                changedFields.delete(fieldId);
            } else {
                console.error("Błąd zapisu:", result);
                alert("Błąd zapisu: " + result);
            }
        } else {
            const errorText = await saveRes.text();
            console.error("Błąd HTTP:", saveRes.status, errorText);
            alert("Błąd zapisu: " + saveRes.status + " - " + errorText);
        }
    } catch (e) {
        console.log("Błąd zapisu danych:", e);
    }
}

// Automatyczne uzupełnianie danych z data.json
async function loadData() {
    // Nie odświeżaj jeśli jakiekolwiek pole ma focus
    if (focusedFields.size > 0) {
        return;
    }

    try {
        const res = await fetch("data.json?x=" + Date.now());
        if (!res.ok) return;
        const d = await res.json();

        // Aktualizuj tylko pola które nie są edytowane i nie zostały zmienione
        if (d.D1 != null && !focusedFields.has('sensor1') && !changedFields.has('sensor1')) {
            document.getElementById("sensor1").value = d.D1;
        }
        if (d.D2 != null && !focusedFields.has('sensor2') && !changedFields.has('sensor2')) {
            document.getElementById("sensor2").value = d.D2;
        }
        if (d.D3 != null && !focusedFields.has('sensor3') && !changedFields.has('sensor3')) {
            document.getElementById("sensor3").value = d.D3;
        }
        if (d.D4 != null && !focusedFields.has('sensor4') && !changedFields.has('sensor4')) {
            document.getElementById("sensor4").value = d.D4;
        }
        if (d.D5 != null && !focusedFields.has('sensor5') && !changedFields.has('sensor5')) {
            document.getElementById("sensor5").value = d.D5;
        }
        if (d.D6 != null && !focusedFields.has('sensor6') && !changedFields.has('sensor6')) {
            document.getElementById("sensor6").value = d.D6;
        }

        // Ustawienia podawania (S1-S6)
        if (d.S1 != null && !focusedFields.has('setting1') && !changedFields.has('setting1')) {
            document.getElementById("setting1").value = d.S1;
        }
        if (d.S2 != null && !focusedFields.has('setting2') && !changedFields.has('setting2')) {
            document.getElementById("setting2").value = d.S2;
        }
        if (d.S3 != null && !focusedFields.has('setting3') && !changedFields.has('setting3')) {
            document.getElementById("setting3").value = d.S3;
        }
        if (d.S4 != null && !focusedFields.has('setting4') && !changedFields.has('setting4')) {
            document.getElementById("setting4").value = d.S4;
        }
        if (d.S5 != null && !focusedFields.has('setting5') && !changedFields.has('setting5')) {
            document.getElementById("setting5").value = d.S5;
        }
        if (d.S6 != null && !focusedFields.has('setting6') && !changedFields.has('setting6')) {
            document.getElementById("setting6").value = d.S6;
        }

        if (d.T != null && !focusedFields.has('temperature') && !changedFields.has('temperature')) {
            document.getElementById("temperature").value = d.T;
        }
        if (d.V != null && !focusedFields.has('flow') && !changedFields.has('flow')) {
            document.getElementById("flow").value = d.V;
        }

        // Pola kalibracji
        if (d.PH != null && !focusedFields.has('ph') && !changedFields.has('ph')) {
            document.getElementById("ph").value = d.PH;
        }
        if (d.GH != null && !focusedFields.has('gh') && !changedFields.has('gh')) {
            document.getElementById("gh").value = d.GH;
        }
        if (d.KH != null && !focusedFields.has('kh') && !changedFields.has('kh')) {
            document.getElementById("kh").value = d.KH;
        }
        if (d.NO2 != null && !focusedFields.has('no2') && !changedFields.has('no2')) {
            document.getElementById("no2").value = d.NO2;
        }
        if (d.NO3 != null && !focusedFields.has('no3') && !changedFields.has('no3')) {
            document.getElementById("no3").value = d.NO3;
        }
        if (d.CL2 != null && !focusedFields.has('cl2') && !changedFields.has('cl2')) {
            document.getElementById("cl2").value = d.CL2;
        }

    } catch (e) {
        console.log("Błąd odczytu danych JSON:", e);
    }
}

// Dodaj event listenery do wszystkich pól input
function setupFieldListeners() {
    // Wszystkie pola są edytowalne (odległości, ustawienia podawania, temperatura, przepływ, kalibracja)
    const editableFields = ['sensor1', 'sensor2', 'sensor3', 'sensor4', 'sensor5', 'sensor6', 'setting1', 'setting2', 'setting3', 'setting4', 'setting5', 'setting6', 'temperature', 'flow', 'ph', 'gh', 'kh', 'no2', 'no3', 'cl2'];
    
    // Pola edytowalne - dodaj listenery do zapisu
    editableFields.forEach(fieldId => {
        const field = document.getElementById(fieldId);
        if (field) {
            // Śledź focus
            field.addEventListener('focus', () => {
                focusedFields.add(fieldId);
            });
            
            // Śledź blur i zapisz zmiany
            field.addEventListener('blur', () => {
                focusedFields.delete(fieldId);
                const value = field.value;
                const originalValue = field.getAttribute('data-original-value');
                
                if (value !== originalValue) {
                    changedFields.add(fieldId);
                    saveData(fieldId, value);
                } else {
                    changedFields.delete(fieldId);
                }
            });
            
            // Zapisz przy naciśnięciu Enter
            field.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    field.blur(); // To wywoła zapis przez blur event
                }
            });
        }
    });
}

// Odświeżanie danych co 1 sekundę
setInterval(loadData, 1000);
loadData();

// Ustaw listenery po załadowaniu strony
setupFieldListeners();

// Zapisz oryginalne wartości po pierwszym załadowaniu (wszystkie pola)
setTimeout(() => {
    const allFields = ['sensor1', 'sensor2', 'sensor3', 'sensor4', 'sensor5', 'sensor6', 'setting1', 'setting2', 'setting3', 'setting4', 'setting5', 'setting6', 'temperature', 'flow', 'ph', 'gh', 'kh', 'no2', 'no3', 'cl2'];
    allFields.forEach(fieldId => {
        const field = document.getElementById(fieldId);
        if (field) {
            field.setAttribute('data-original-value', field.value || '');
        }
    });
}, 500);
</script>
